services:
  app:
    build:
      context: ./docker/php
    container_name: bolao_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres
      - redis
    networks: [bolao]

  nginx:
    image: nginx:alpine
    container_name: bolao_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [bolao]

  postgres:
    image: postgres:16-alpine
    container_name: bolao_postgres
    environment:
      POSTGRES_DB: bolao
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [bolao]

  redis:
    image: redis:7-alpine
    container_name: bolao_redis
    ports:
      - "6379:6379"
    networks: [bolao]

  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    container_name: bolao_soketi
    environment:
      SOKETI_DEFAULT_APP_ID: bolao
      SOKETI_DEFAULT_APP_KEY: bolaokey
      SOKETI_DEFAULT_APP_SECRET: bolaosecret
    ports:
      - "6001:6001"
    networks: [bolao]

  horizon:
    build:
      context: ./docker/php
    container_name: bolao_horizon
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
    depends_on:
      - app
      - redis
    networks: [bolao]

  scheduler:
    build:
      context: ./docker/php
    container_name: bolao_scheduler
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www
    depends_on:
      - app
    networks: [bolao]

  node:
    image: node:20-alpine
    container_name: bolao_node
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks: [bolao]

volumes:
  pgdata:

networks:
  bolao:
    driver: bridge
